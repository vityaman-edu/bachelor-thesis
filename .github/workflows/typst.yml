name: Typst

on:
  workflow_dispatch:

jobs:
  build:
    name: Compile PDF
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Typst
        run: |
          DIST=typst-x86_64-unknown-linux-musl
          wget https://github.com/typst/typst/releases/download/v0.13.0/$DIST.tar.xz
          tar -xf $DIST.tar.xz
          cd $DIST
          mv typst /usr/local/bin/

      - name: Compile PDF
        run: |
          typst compile source/main.typ build/thesis.pdf

      - name: Upload the thesis PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf
          path: build/thesis.pdf

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download the thesis PDF
        uses: actions/download-artifact@v4
        with:
          name: thesis-pdf

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/thesis.pdf
          generate_release_notes: true
